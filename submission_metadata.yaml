  platform: "Local Intel Core PC"               # Hardware platform
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.10.11"                     # python --version
  os: "Windows 11"                              # OS version
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true                # true if you pre-compute embeddings
  pre_computation_time_minutes: 42              # Embedding precompute took ~41.6 minutes

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Antigravity IDE Assistant"
  - "Cursor"

ai_usage_summary: |
  Used the Antigravity coding assistant for codebase design, modular logic implementation, and debugging.
  No candidate data was shared with external LLM APIs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-stage hybrid ranking system. Combines semantic matching (cosine similarity over cached all-MiniLM-L6-v2 embeddings) with 9 strict logical disqualifiers (such as LangChain-only, consulting-only, research-only) capped at a max penalty of 0.6. Applies behavioral signal modifiers (login recency, response rates, open to work status) and filters logical honeypots down to 0.0. Ties are resolved deterministically by candidate ID ascending. Total ranking runs in ~64 seconds.

